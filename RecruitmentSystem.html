<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TalentBridge – Recruitment System</title>
<link rel="icon" href="data:,">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0d14;
    --surface: #111520;
    --surface2: #161b2e;
    --border: #1e2540;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --accent3: #00d4aa;
    --danger: #f7566a;
    --warn: #f7a84f;
    --text: #e8ecf5;
    --muted: #6b7a9e;
    --card: #131825;
    --radius: 14px;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
  #root { min-height: 100vh; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .flex { display: flex; }
  .flex-col { flex-direction: column; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .justify-center { justify-content: center; }
  .gap-1 { gap: 8px; }
  .gap-2 { gap: 16px; }
  .gap-3 { gap: 24px; }
  .gap-4 { gap: 32px; }
  .w-full { width: 100%; }
  .mt-1 { margin-top: 8px; }
  .mt-2 { margin-top: 16px; }
  .mt-3 { margin-top: 24px; }
  .text-sm { font-size: 13px; }
  .text-xs { font-size: 11px; }
  .text-muted { color: var(--muted); }
  .bold { font-weight: 700; }
  .hidden { display: none; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: .4px;
  }
  .badge-blue { background: #1a2d5a; color: var(--accent); }
  .badge-green { background: #0d2e28; color: var(--accent3); }
  .badge-purple { background: #21183a; color: #b39dff; }
  .badge-red { background: #2e1118; color: var(--danger); }
  .badge-warn { background: #2e2212; color: var(--warn); }
  .badge-gray { background: var(--surface2); color: var(--muted); }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 7px;
    padding: 9px 20px; border-radius: 9px; font-family: var(--font-body);
    font-size: 14px; font-weight: 500; cursor: pointer; border: none;
    transition: all .18s ease; text-decoration: none; white-space: nowrap;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3a7aef; transform: translateY(-1px); box-shadow: 0 6px 20px #4f8ef740; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-danger:hover { background: #e04055; }
  .btn-success { background: var(--accent3); color: #0a0d14; }
  .btn-success:hover { background: #00bfa3; }
  .btn-purple { background: var(--accent2); color: #fff; }
  .btn-purple:hover { background: #6a4de0; }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); background: var(--surface2); }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 7px; }
  .btn-lg { padding: 13px 32px; font-size: 16px; border-radius: 11px; }
  .btn-outline { background: transparent; border: 1.5px solid var(--accent); color: var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; }
  .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

  .form-group { display: flex; flex-direction: column; gap: 7px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: .3px; }
  .form-input {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 9px; padding: 10px 14px; color: var(--text);
    font-family: var(--font-body); font-size: 14px; outline: none;
    transition: border-color .15s; width: 100%;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--muted); }
  .form-select {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 9px; padding: 10px 14px; color: var(--text);
    font-family: var(--font-body); font-size: 14px; outline: none;
    cursor: pointer; -webkit-appearance: none; width: 100%;
  }
  .form-select:focus { border-color: var(--accent); }
  .form-textarea {
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 9px; padding: 10px 14px; color: var(--text);
    font-family: var(--font-body); font-size: 14px; outline: none;
    resize: vertical; min-height: 90px; transition: border-color .15s; width: 100%;
  }
  .form-textarea:focus { border-color: var(--accent); }
  .error-msg { color: var(--danger); font-size: 12px; margin-top: 2px; }
  .success-msg { color: var(--accent3); font-size: 12px; margin-top: 2px; }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px;
    transition: border-color .15s;
  }
  .card-sm { padding: 16px; }
  .card:hover { border-color: #2a3460; }

  #toast-container {
    position: fixed; top: 20px; right: 20px; z-index: 9999;
    display: flex; flex-direction: column; gap: 10px; pointer-events: none;
  }
  .toast {
    padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 500;
    min-width: 250px; animation: slideIn .25s ease; pointer-events: all;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 8px 32px #00000060;
  }
  .toast-success { background: #0d2e28; border: 1px solid var(--accent3); color: var(--accent3); }
  .toast-error { background: #2e1118; border: 1px solid var(--danger); color: var(--danger); }
  .toast-info { background: #1a2d5a; border: 1px solid var(--accent); color: var(--accent); }
  @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  .modal-overlay {
    position: fixed; inset: 0; background: #000000b0;
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px; backdrop-filter: blur(4px);
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 32px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
    animation: scaleIn .2s ease;
  }
  .modal-wide { max-width: 800px; }
  @keyframes scaleIn { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .modal-title { font-family: var(--font-head); font-size: 20px; font-weight: 700; }

  .auth-page {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 20% 50%, #1a2d5a30 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #21183a40 0%, transparent 60%), var(--bg);
  }
  .auth-glow {
    position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, #4f8ef712, transparent 70%);
    pointer-events: none;
  }
  .auth-container { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }
  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo-icon {
    width: 56px; height: 56px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px; display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; margin-bottom: 12px;
  }
  .auth-logo h1 {
    font-family: var(--font-head); font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .auth-logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 32px;
    box-shadow: 0 24px 80px #00000060;
  }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; background: var(--bg); border-radius: 10px; padding: 4px; }
  .auth-tab {
    flex: 1; padding: 8px; text-align: center; border-radius: 7px;
    font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted);
    transition: all .18s;
  }
  .auth-tab.active { background: var(--accent); color: #fff; }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .role-select-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .role-option {
    padding: 12px; border-radius: 10px; border: 1.5px solid var(--border);
    cursor: pointer; text-align: center; transition: all .15s;
  }
  .role-option.selected { border-color: var(--accent); background: #1a2d5a; }
  .role-option-icon { font-size: 22px; margin-bottom: 5px; }
  .role-option-label { font-size: 12px; font-weight: 600; color: var(--text); }
  .role-option-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: #0a0d14e0; border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 62px;
  }
  .nav-logo {
    font-family: var(--font-head); font-size: 20px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: flex; align-items: center; gap: 10px; cursor: pointer;
  }
  .nav-logo-dot { width: 8px; height: 8px; background: var(--accent3); border-radius: 50%; flex-shrink: 0; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .nav-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    color: #fff;
  }

  .layout { display: flex; min-height: calc(100vh - 62px); }
  .sidebar {
    width: 240px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--border); padding: 20px 12px;
    display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 62px; height: calc(100vh - 62px); overflow-y: auto;
  }
  .sidebar-section { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; color: var(--muted); padding: 12px 12px 6px; text-transform: uppercase; }
  .sidebar-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 9px; cursor: pointer;
    font-size: 13px; font-weight: 500; color: var(--muted); transition: all .15s;
  }
  .sidebar-item:hover { color: var(--text); background: var(--surface2); }
  .sidebar-item.active { color: var(--accent); background: #1a2d5a; }
  .sidebar-item-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-badge {
    margin-left: auto; background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 10px;
  }
  .content { flex: 1; padding: 32px; overflow-y: auto; max-width: calc(100vw - 240px); }

  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 20px;
    transition: transform .15s, border-color .15s;
  }
  .stat-card:hover { transform: translateY(-2px); border-color: #2a3460; }
  .stat-label { font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-head); font-size: 32px; font-weight: 800; }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .stat-icon { font-size: 22px; margin-bottom: 10px; }

  .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .7px; color: var(--muted); text-transform: uppercase; }
  td { padding: 13px 16px; font-size: 13px; border-top: 1px solid var(--border); }
  tr:hover td { background: var(--surface2); }

  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 9px 14px; flex: 1;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar input { background: none; border: none; outline: none; color: var(--text); font-family: var(--font-body); font-size: 14px; flex: 1; }
  .search-bar input::placeholder { color: var(--muted); }

  .job-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 22px; transition: all .18s; cursor: pointer;
  }
  .job-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px #4f8ef718; }
  .job-card-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .job-card-company { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .job-card-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 14px; }
  .job-card-footer { display: flex; justify-content: space-between; align-items: center; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .page-title { font-family: var(--font-head); font-size: 26px; font-weight: 800; }
  .page-subtitle { color: var(--muted); font-size: 14px; margin-top: 4px; }

  .upload-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 28px;
    text-align: center; cursor: pointer; transition: all .2s;
    background: var(--surface2);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: #1a2d5a20; }
  .upload-icon { font-size: 32px; margin-bottom: 8px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab { padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .progress-bar { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .4s; }

  .timeline { position: relative; padding-left: 28px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 0; bottom: 0; width: 2px; background: var(--border); }
  .timeline-item { position: relative; padding-bottom: 24px; }
  .timeline-dot { position: absolute; left: -24px; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
  .timeline-dot.done { background: var(--accent3); }
  .timeline-dot.pending { background: var(--warn); }

  .notif-item {
    padding: 14px; border-radius: 10px; border: 1px solid var(--border);
    margin-bottom: 10px; transition: background .15s; cursor: pointer;
  }
  .notif-item:hover { background: var(--surface2); }
  .notif-item.unread { border-left: 3px solid var(--accent); }

  .score-wrap { display: flex; align-items: center; gap: 10px; }
  .score-bar { flex: 1; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-family: var(--font-head); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }

  .interview-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }

  .hero {
    padding: 80px 32px 60px;
    background: radial-gradient(ellipse at 50% 0%, #1a2d5a40, transparent 60%), var(--bg);
    text-align: center;
  }
  .hero h1 { font-family: var(--font-head); font-size: clamp(36px, 6vw, 68px); font-weight: 800; line-height: 1.1; margin-bottom: 18px; }
  .hero h1 span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .hero p { font-size: clamp(15px, 2vw, 18px); color: var(--muted); max-width: 560px; margin: 0 auto 36px; line-height: 1.7; }
  .hero-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 0 32px 60px; }
  .feature-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px; transition: border-color .2s;
  }
  .feature-card:hover { border-color: var(--accent); }
  .feature-icon { font-size: 32px; margin-bottom: 14px; }
  .feature-title { font-family: var(--font-head); font-size: 17px; font-weight: 700; margin-bottom: 8px; }
  .feature-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .pipeline-stage {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 9px; background: var(--surface2);
    border: 1px solid var(--border); margin-bottom: 8px;
    cursor: pointer; transition: border-color .15s;
  }
  .pipeline-stage:hover { border-color: var(--accent); }
  .pipeline-count { font-family: var(--font-head); font-size: 22px; font-weight: 800; min-width: 40px; }

  @media (max-width: 900px) {
    .sidebar { display: none; }
    .content { max-width: 100vw; padding: 20px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .features-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .navbar { padding: 0 16px; }
    .auth-card { padding: 22px; }
    .content { padding: 16px; }
  }
</style>
</head>

//  STATE INITIALIZATION
// ══════════════════════════════════════════════
function initData() {
  if (!localStorage.getItem("tb_users")) {
    localStorage.setItem("tb_users", JSON.stringify(DEFAULT_USERS));
  }
  if (!localStorage.getItem("tb_jobs")) {
    localStorage.setItem("tb_jobs", JSON.stringify(DEFAULT_JOBS));
  }
  // If jobs list is empty (was set to [] before), populate with defaults
  const storedJobs = JSON.parse(localStorage.getItem("tb_jobs") || "[]");
  if (storedJobs.length === 0) {
    localStorage.setItem("tb_jobs", JSON.stringify(DEFAULT_JOBS));
  }
  if (!localStorage.getItem("tb_applications")) {
    localStorage.setItem("tb_applications", JSON.stringify([]));
  }
  if (!localStorage.getItem("tb_interviews")) {
    localStorage.setItem("tb_interviews", JSON.stringify([]));
  }
  if (!localStorage.getItem("tb_notifications")) {
    localStorage.setItem("tb_notifications", JSON.stringify([]));
  }
}

function loadData() {
  return {
    users: JSON.parse(localStorage.getItem("tb_users")) || DEFAULT_USERS,
    jobs: JSON.parse(localStorage.getItem("tb_jobs")) || DEFAULT_JOBS,
    applications: JSON.parse(localStorage.getItem("tb_applications")) || [],
    interviews: JSON.parse(localStorage.getItem("tb_interviews")) || [],
    notifications: JSON.parse(localStorage.getItem("tb_notifications")) || []
  };
}

function saveData() {
  localStorage.setItem("tb_users", JSON.stringify(state.data.users));
  localStorage.setItem("tb_jobs", JSON.stringify(state.data.jobs));
  localStorage.setItem("tb_applications", JSON.stringify(state.data.applications));
  localStorage.setItem("tb_interviews", JSON.stringify(state.data.interviews));
  localStorage.setItem("tb_notifications", JSON.stringify(state.data.notifications));
  if (state.user) {
    localStorage.setItem("tb_currentUser", JSON.stringify(state.user));
  }
}

initData();

let state = {
  user: JSON.parse(localStorage.getItem("tb_currentUser")) || null,
  page: "landing",
  authTab: "login",
  search: "",
  jobFilter: "all",
  activeTab: 0,
  modal: null,
  selectedRole: "candidate",
  data: loadData()
};

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function genId(prefix) {
  return (prefix || 'id') + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

function getUsers() { return state.data.users; }
function getUser(id) { return state.data.users.find(u => u.id === id); }
function getJob(id) { return state.data.jobs.find(j => j.id === id); }
function getCandidates() { return state.data.users.filter(u => u.role === 'candidate'); }
function getRecruiters() { return state.data.users.filter(u => u.role === 'recruiter'); }
function getApplicationsForJob(jobId) { return state.data.applications.filter(a => a.jobId === jobId); }
function getApplicationsForCandidate(cId) { return state.data.applications.filter(a => a.candidateId === cId); }
function getUnreadNotifs(userId) { return state.data.notifications.filter(n => n.userId === userId && !n.read).length; }

function formatDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
}

function statusColor(s) {
  const m = { Applied: 'badge-blue', Shortlisted: 'badge-purple', Interview: 'badge-warn', Selected: 'badge-green', Rejected: 'badge-red', Offered: 'badge-green', Withdrawn: 'badge-gray' };
  return m[s] || 'badge-gray';
}

function scoreColor(s) {
  if (s >= 80) return 'var(--accent3)';
  if (s >= 60) return 'var(--warn)';
  return 'var(--danger)';
}

function normalizeSkill(skill) {
  return skill.toLowerCase().replace(/[\.\-]/g, '').trim();
}

const SKILL_ALIASES = {
  "reactjs": "react", "react.js": "react", "react-js": "react",
  "nodejs": "node", "node.js": "node",
  "javascript": "js", "java script": "js",
  "typescript": "ts", "type script": "ts",
  "postgresql": "postgres", "postgres": "postgresql",
  "mongodb": "mongo",
  "expressjs": "express", "express.js": "express",
  "python3": "python",
  "c++": "cpp", "cplusplus": "cpp",
  "html5": "html", "css3": "css",
  "docker": "docker", "kubernetes": "k8s",
  "aws": "aws", "amazon web services": "aws",
  "azure": "azure", "gcp": "gcp", "google cloud": "gcp"
};

function mapAlias(skill) {
  return SKILL_ALIASES[skill] || skill;
}

function extractSkills(skillString) {
  return (skillString || "")
    .split(/,|\||\/|\n|\s+/)   // handles comma, space, newline etc
    .map(s => mapAlias(normalizeSkill(s)))
    .filter(Boolean);
}

function scoreResume(candidateId, jobId) {
  console.log("✅ AI scoring running");

  const c = getUser(candidateId);
  const j = getJob(jobId);

  // fallback
  if (!c || !j) return 50;

  const cSkills = extractSkills(c.skills);
  const jSkills = (j.skills || []).map(s => mapAlias(normalizeSkill(s)));

  if (jSkills.length === 0) return 60;

  const cSet = new Set(cSkills);

  let matches = 0;

  jSkills.forEach(js => {
    // exact match OR partial match (important!)
    const found = [...cSet].some(cs => cs.includes(js) || js.includes(cs));
    if (found) matches++;
  });

  const matchRatio = matches / jSkills.length;

  // better scoring curve
  let score = 35 + (matchRatio * 60);

  // bonus if many matches
  if (matches >= 3) score += 5;

  // slight randomness for realism
  const noise = Math.floor(Math.random() * 5);

  return Math.min(98, Math.round(score + noise));
}

function navigate(page, sub) {
  state.page = page;
  state.search = '';
  state.jobFilter = 'all';
  state.activeTab = 0;
  state.modal = null;
  if (page === 'auth') {
    state.authTab = sub || 'login';
    state.user = null;
  }
  render();
}

function logout() {
  state.user = null;
  state.modal = null;
  localStorage.removeItem("tb_currentUser");
  navigate('landing');
}

function updateSearch(val) { state.search = val; render(); }
function setFilter(val) { state.jobFilter = val; render(); }
function setTab(i) { state.activeTab = i; render(); }
function switchAuthTab(tab) { state.authTab = tab; render(); }
function selectRole(role) { state.selectedRole = role; render(); }

function openModal(type, data) { 
  state.modal = { type, data }; 
  render(); 
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  state.modal = null;
  render();
}

function attachEvents() {
  // Drag-and-drop for upload zone
  const zone = document.getElementById('upload-zone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
    zone.addEventListener('drop', e => {
      e.preventDefault(); zone.classList.remove('drag');
      const file = e.dataTransfer.files[0];
      if (file) processResumeFile(file);
    });
  }
}

function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email')?.value.trim().toLowerCase();
  const pass = document.getElementById('login-pass')?.value;
  const errEl = document.getElementById('login-err');

  const user = state.data.users.find(u => u.email.toLowerCase() === email && u.password === pass);
  if (!user) { errEl.textContent = '❌ Invalid email or password.'; return; }
  if (!user.active) { errEl.textContent = '❌ This account has been deactivated.'; return; }

  state.user = { ...user };
  localStorage.setItem("tb_currentUser", JSON.stringify(state.user));
  state.page = 'dashboard';
  showToast(`Welcome back, ${user.name.split(' ')[0]}! 🎉`, 'success');
  render();
}

function handleRegister(e) {
  e.preventDefault();
  const name = document.getElementById('reg-name')?.value.trim();
  const email = document.getElementById('reg-email')?.value.trim().toLowerCase();
  const phone = document.getElementById('reg-phone')?.value.trim();
  const pass = document.getElementById('reg-pass')?.value;
  const cpass = document.getElementById('reg-cpass')?.value;
  const role = state.selectedRole || 'candidate';

  // Validation
  let valid = true;
  const setErr = (id, msg) => { const el = document.getElementById(id); if (el) el.textContent = msg; if (msg) valid = false; };
  setErr('reg-name-err', name.length < 3 ? 'Name must be at least 3 characters.' : '');
  setErr('reg-email-err', !email.includes('@') ? 'Enter a valid email.' : '');
  setErr('reg-phone-err', !/^\d{10}$/.test(phone) ? 'Enter a valid 10-digit phone number.' : '');
  setErr('reg-pass-err', pass.length < 8 ? 'Password must be at least 8 characters.' : '');
  setErr('reg-cpass-err', pass !== cpass ? 'Passwords do not match.' : '');
  if (!valid) return;

  if (state.data.users.find(u => u.email.toLowerCase() === email)) {
    document.getElementById('reg-email-err').textContent = '❌ Email already registered.';
    return;
  }

  const newUser = {
    id: genId('user'),
    name, email, password: pass, phone, role,
    active: true,
    createdAt: new Date().toISOString().slice(0, 10),
    skills: '', experience: '', resume: null, resumeFilename: ''
  };

  state.data.users.push(newUser);
  saveData();

  state.user = { ...newUser };
  localStorage.setItem("tb_currentUser", JSON.stringify(state.user));
  state.page = 'dashboard';
  showToast(`Welcome to TalentBridge, ${name.split(' ')[0]}! 🚀`, 'success');
  render();
}

function quickLogin(email, password) {
  const user = state.data.users.find(u => u.email.toLowerCase() === email.toLowerCase() && u.password === password);
  if (!user) { showToast('Demo account not found. Try resetting data.', 'error'); return; }
  state.user = { ...user };
  localStorage.setItem("tb_currentUser", JSON.stringify(state.user));
  state.page = 'dashboard';
  showToast(`Logged in as ${user.role}!`, 'success');
  render();
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  if (!c) return;
  const t = document.createElement('div');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.className = `toast toast-${type}`;
  t.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(() => {
    t.style.animation = 'slideIn .25s ease reverse';
    setTimeout(() => t.remove(), 250);
  }, 3500);
}

// ══════════════════════════════════════════════
//  RENDER ENGINE
// ══════════════════════════════════════════════
function render() {
  const root = document.getElementById('root');
  if (!root) return;

  if (!state.user) {
    root.innerHTML = state.page === 'landing' ? renderLanding() : renderAuth();
  } else {
    const role = state.user.role;
    if (role === 'admin') root.innerHTML = renderAdminApp();
    else if (role === 'recruiter') root.innerHTML = renderRecruiterApp();
    else root.innerHTML = renderCandidateApp();
  }

  attachEvents();
}

  const isLogin = state.authTab === 'login';
  return `
  <div class="auth-page">
    <div class="auth-glow" style="top:-200px;left:-200px;"></div>
    <div class="auth-glow" style="bottom:-200px;right:-200px;background:radial-gradient(circle,#7c5cfc12,transparent 70%);"></div>
    <div class="auth-container">
      <div class="auth-logo">
        <div><div class="auth-logo-icon">🌉</div></div>
        <h1>TalentBridge</h1>
        <p>Smart Recruitment Platform</p>
      </div>
      <div class="auth-card">
        <div class="auth-tabs">
          <div class="auth-tab ${isLogin ? 'active' : ''}" onclick="switchAuthTab('login')">Sign In</div>
          <div class="auth-tab ${!isLogin ? 'active' : ''}" onclick="switchAuthTab('register')">Register</div>
        </div>
        ${isLogin ? renderLoginForm() : renderRegisterForm()}
        <div style="text-align:center;margin-top:16px;">
          <button class="btn btn-ghost btn-sm" onclick="navigate('landing')">← Back to Home</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderLoginForm() {
  return `
  <form onsubmit="handleLogin(event)">
    <div class="flex flex-col gap-2">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" id="login-email" type="email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="login-pass" type="password" placeholder="Enter your password" required />
      </div>
      <div class="error-msg" id="login-err" style="text-align:center;"></div>
      <button type="submit" class="btn btn-primary w-full mt-2">🔐 Sign In to TalentBridge</button>
    </div>
  </form>
  <div class="divider"></div>
  <div style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px;">Quick Demo Access</div>
  <div style="display:flex;flex-direction:column;gap:7px;">
    <button class="btn btn-secondary btn-sm" onclick="quickLogin('admin@talentbridge.com','admin123')">👑 Admin Login</button>
    <button class="btn btn-secondary btn-sm" onclick="quickLogin('recruiter@talentbridge.com','recruiter123')">👔 HR Login</button>
    <button class="btn btn-secondary btn-sm" onclick="quickLogin('candidate@talentbridge.com','candidate123')">👤 Candidate Login</button>
  </div>`;
}

function renderRegisterForm() {
  const role = state.selectedRole || 'candidate';
  return `
  <form onsubmit="handleRegister(event)">
    <div class="flex flex-col gap-2">
      <div>
        <div class="form-label" style="margin-bottom:8px;">I want to join as</div>
        <div class="role-select-grid">
          <div class="role-option ${role === 'candidate' ? 'selected' : ''}" onclick="selectRole('candidate')">
            <div class="role-option-icon">👤</div>
            <div class="role-option-label">Candidate</div>
            <div class="role-option-sub">Find & apply for jobs</div>
          </div>
          <div class="role-option ${role === 'recruiter' ? 'selected' : ''}" onclick="selectRole('recruiter')">
            <div class="role-option-icon">👔</div>
            <div class="role-option-label">HR</div>
            <div class="role-option-sub">Post & manage jobs</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input class="form-input" id="reg-name" type="text" placeholder="Your full name" required minlength="3"/>
        <div class="error-msg" id="reg-name-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" id="reg-email" type="email" placeholder="you@email.com" required/>
        <div class="error-msg" id="reg-email-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input class="form-input" id="reg-phone" type="tel" placeholder="10-digit phone number" required/>
        <div class="error-msg" id="reg-phone-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" id="reg-pass" type="password" placeholder="Min 8 characters" required minlength="8"/>
        <div class="error-msg" id="reg-pass-err"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" id="reg-cpass" type="password" placeholder="Repeat your password" required/>
        <div class="error-msg" id="reg-cpass-err"></div>
      </div>
      <button type="submit" class="btn btn-primary w-full mt-2">🚀 Create Account</button>
    </div>

}

function renderNavbar() {
  const u = state.user;
  const unread = getUnreadNotifs(u.id);
  const roleBadge = { admin: '👑 Admin', recruiter: '👔 HR', candidate: '👤 Candidate' };
  return `
  <nav class="navbar">
    <div class="nav-logo" onclick="navigate('dashboard')">
      <div class="nav-logo-dot"></div>
      TalentBridge
    </div>
    <div class="nav-right">
      <span class="badge ${u.role==='admin'?'badge-red':u.role==='recruiter'?'badge-purple':'badge-blue'}">${roleBadge[u.role]||u.role}</span>
      <button class="btn btn-ghost btn-sm" style="position:relative" onclick="navigate('notifications')">
        🔔
        ${unread > 0 ? `<span style="position:absolute;top:2px;right:2px;width:16px;height:16px;background:var(--danger);border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#fff;">${unread}</span>` : ''}
      </button>
      <div class="nav-avatar" onclick="navigate('profile')" title="${u.name}">${u.name ? u.name[0].toUpperCase() : '?'}</div>
      <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>`;
}

function sidebarItem(page, icon, label, active, badge) {
  return `
  <div class="sidebar-item ${active ? 'active' : ''}" onclick="navigate('${page}')">
    <span class="sidebar-item-icon">${icon}</span>
    <span>${label}</span>
    ${badge ? `<span class="sidebar-badge">${badge}</span>` : ''}
  </div>`;
}

function renderAdminApp() {
  const p = state.page || 'dashboard';
  const pages = { dashboard: renderAdminDashboard, users: renderUserManagement, jobs: renderRecruiterJobs, applications: renderRecruiterApplications, reports: renderAdminReports, settings: renderSettings };
  return `
  ${renderNavbar()}
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">Main</div>
      ${sidebarItem('dashboard','📊','Dashboard', p==='dashboard')}
      ${sidebarItem('users','👥','User Management', p==='users')}
      ${sidebarItem('jobs','💼','Job Postings', p==='jobs')}
      ${sidebarItem('applications','📄','Applications', p==='applications')}
      <div class="sidebar-section">Analytics</div>
      ${sidebarItem('reports','📈','Reports & Analytics', p==='reports')}
      <div class="sidebar-section">Account</div>
      ${sidebarItem('settings','⚙️','Settings', p==='settings')}
      ${sidebarItem('notifications','🔔','Notifications', p==='notifications', getUnreadNotifs(state.user.id)||'')}
    </div>
    <div class="content">${(pages[p]||renderAdminDashboard)()}</div>
  </div>
  ${renderModal()}`;
}

function renderAdminDashboard() {
  const users = state.data.users;
  const apps = state.data.applications;
  const jobs = state.data.jobs;
  const interviews = state.data.interviews;
  const candidates = users.filter(u => u.role === 'candidate').length;
  const recruiters = users.filter(u => u.role === 'recruiter').length;
  const activeJobs = jobs.filter(j => (j.status||'Active') === 'Active').length;
  const hired = apps.filter(a => a.status === 'Selected').length;
  const shortlisted = apps.filter(a => a.shortlisted).length;

  return `
  <div class="page-header">
    <div>
      <div class="page-title">Admin Dashboard</div>
      <div class="page-subtitle">System overview and recruitment performance</div>
    </div>
    <div class="badge badge-green">● System Healthy</div>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Total Users</div><div class="stat-value" style="color:var(--accent)">${users.length}</div><div class="stat-sub">${candidates} candidates · ${recruiters} recruiters</div></div>
    <div class="stat-card"><div class="stat-icon">💼</div><div class="stat-label">Active Jobs</div><div class="stat-value" style="color:var(--accent2)">${activeJobs}</div><div class="stat-sub">${jobs.length} total postings</div></div>
    <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-label">Applications</div><div class="stat-value" style="color:var(--accent3)">${apps.length}</div><div class="stat-sub">${shortlisted} shortlisted</div></div>
    <div class="stat-card"><div class="stat-icon">🎉</div><div class="stat-label">Hired</div><div class="stat-value" style="color:var(--warn)">${hired}</div><div class="stat-sub">Offer acceptance: 94%</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:24px;">
    <div class="card">
      <div style="font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:16px;">📊 Application Pipeline</div>
      ${['Applied','Shortlisted','Interview','Selected','Rejected'].map(s => {
        const count = apps.filter(a => a.status === s).length;
        const pct = Math.round((count / Math.max(apps.length, 1)) * 100);
        return `<div style="margin-bottom:14px;">
          <div class="flex justify-between text-sm" style="margin-bottom:5px;"><span>${s}</span><span style="color:var(--muted)">${count} (${pct}%)</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${s==='Selected'?'var(--accent3)':s==='Rejected'?'var(--danger)':'var(--accent)'}"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div style="font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:16px;">👥 Recent Users</div>
      ${users.slice(-6).reverse().map(u => `
        <div class="flex items-center gap-2" style="padding:10px 0;border-bottom:1px solid var(--border);">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;">${u.name?u.name[0].toUpperCase():'U'}</div>
          <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${u.name||'Unknown'}</div><div class="text-xs text-muted">${u.email||'-'}</div></div>
          <div class="badge ${u.role==='admin'?'badge-red':u.role==='recruiter'?'badge-purple':'badge-blue'}">${u.role}</div>
        </div>
      `).join('')}
    </div>
  </div>
  <div class="card">
    <div style="font-family:var(--font-head);font-size:15px;font-weight:700;margin-bottom:16px;">💼 Top Job Postings</div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Job Title</th><th>Department</th><th>Status</th><th>Applicants</th><th>Posted</th></tr></thead>
        <tbody>
          ${jobs.map(j => `
            <tr>
              <td><div style="font-weight:600">${j.title}</div><div class="text-xs text-muted">${j.location}</div></td>
              <td>${j.department||'-'}</td>
              <td><span class="badge ${(j.status||'Active')==='Active'?'badge-green':'badge-gray'}">${j.status||'Active'}</span></td>
              <td><span class="badge badge-blue">${getApplicationsForJob(j.id).length}</span></td>
              <td class="text-muted">${formatDate(j.postedAt)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function renderUserManagement() {
  const search = state.search.toLowerCase();
  const filtered = state.data.users.filter(u =>
    (u.name||'').toLowerCase().includes(search) || (u.email||'').toLowerCase().includes(search)
  ).filter(u => !state.jobFilter || state.jobFilter === 'all' || u.role === state.jobFilter);

  return `
  <div class="page-header">
    <div><div class="page-title">User Management</div><div class="page-subtitle">Manage all system users and permissions</div></div>
    <button class="btn btn-primary" onclick="openModal('addUser')">+ Add User</button>
  </div>
  <div class="flex gap-2" style="margin-bottom:20px;flex-wrap:wrap;">
    <div class="search-bar" style="max-width:360px;"><span>🔍</span><input placeholder="Search users…" value="${state.search}" oninput="updateSearch(this.value)" /></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${['All','Admin','Recruiter','Candidate'].map(r => `<button class="btn btn-sm ${(state.jobFilter===r.toLowerCase()||(!state.jobFilter&&r==='All'))?'btn-primary':'btn-secondary'}" onclick="setFilter('${r.toLowerCase()}')">${r}</button>`).join('')}
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>User</th><th>Role</th><th>Phone</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody>
        ${filtered.map(u => `
          <tr>
            <td><div class="flex items-center gap-1">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;">${(u.name||'U')[0].toUpperCase()}</div>
              <div><div style="font-weight:600">${u.name}</div><div class="text-xs text-muted">${u.email}</div></div>
            </div></td>
            <td><span class="badge ${u.role==='admin'?'badge-red':u.role==='recruiter'?'badge-purple':'badge-blue'}">${u.role}</span></td>
            <td class="text-muted">${u.phone||'-'}</td>
            <td><span class="badge ${u.active?'badge-green':'badge-gray'}">${u.active?'Active':'Inactive'}</span></td>
            <td class="text-muted">${formatDate(u.createdAt)}</td>
            <td><div class="flex gap-1">
              <button class="btn btn-sm btn-secondary" onclick="openModal('viewUser',${JSON.stringify(u.id).replace(/"/g,'&quot;')})">👁️ View</button>
              <button class="btn btn-sm ${u.active?'btn-danger':'btn-success'}" onclick="toggleUserStatus('${u.id}')">${u.active?'Disable':'Enable'}</button>
              <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.id}')">🗑️</button>
            </div></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderAdminReports() {
  const users = state.data.users;
  const jobs = state.data.jobs;
  const apps = state.data.applications;
  const hired = apps.filter(a => a.status === 'Selected').length;
  const convRate = apps.length ? Math.round((hired / apps.length) * 100) : 0;
  const avgScore = apps.length ? Math.round(apps.reduce((s, a) => s + (a.resumeScore || 60), 0) / apps.length) : 0;

  return `
  <div class="page-header">
    <div><div class="page-title">Reports & Analytics</div><div class="page-subtitle">Comprehensive recruitment performance metrics</div></div>
    <button class="btn btn-secondary" onclick="showToast('Report exported!','success')">📥 Export Report</button>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">📈</div><div class="stat-label">Conversion Rate</div><div class="stat-value">${convRate}%</div></div>
    <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-label">Avg AI Score</div><div class="stat-value">${avgScore}%</div></div>
    <div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-label">Avg Time-to-Hire</div><div class="stat-value">18 days</div></div>
    <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-label">Cost-per-Hire</div><div class="stat-value">₹12K</div></div>
  </div>
  <div class="grid-2">
    <div class="card">
      <div style="font-weight:700;margin-bottom:16px;">📊 Jobs by Department</div>
      ${[...new Set(jobs.map(j => j.department||'General'))].map(dept => {
        const count = jobs.filter(j => (j.department||'General') === dept).length;
        const pct = Math.round((count / Math.max(jobs.length, 1)) * 100);
        return `<div style="margin-bottom:12px;">
          <div class="flex justify-between text-sm"><span>${dept}</span><span>${count} jobs</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:16px;">🏆 Top HR Staff</div>
      ${getRecruiters().map((r, i) => {
        const posted = jobs.filter(j => j.postedBy === r.id).length;
        const hiredCount = apps.filter(a => a.status === 'Selected' && jobs.some(j => j.id === a.jobId && j.postedBy === r.id)).length;
        return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
          <div style="font-weight:600">${i+1}. ${r.name}</div>
          <div class="text-sm text-muted">${posted} jobs posted · ${hiredCount} candidates hired</div>
        </div>`;
      }).join('')}
      ${getRecruiters().length === 0 ? '<div class="text-muted text-sm">No recruiters yet.</div>' : ''}
    </div>
  </div>`;
}

function renderSettings() {
  const u = state.user;
  return `
  <div class="page-title" style="margin-bottom:24px;">⚙️ Profile & Settings</div>
  <div class="grid-2">
    <div class="card">
      <div style="font-weight:700;margin-bottom:16px;">Profile Settings</div>
      <div class="flex flex-col gap-2">
        <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" id="p-name" value="${u.name||''}" /></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="p-email" value="${u.email||''}" type="email" /></div>
        <div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="p-phone" value="${u.phone||''}" /></div>
        <button class="btn btn-primary" onclick="saveProfile()">💾 Save Changes</button>
      </div>
    </div>
    <div class="card">
      <div style="font-weight:700;margin-bottom:16px;">🔐 Security</div>
      <div class="flex flex-col gap-2">
        <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" type="password" id="cp-cur" placeholder="••••••••" /></div>
        <div class="form-group"><label class="form-label">New Password</label><input class="form-input" type="password" id="cp-new" placeholder="Min 8 characters" /></div>
        <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" type="password" id="cp-confirm" placeholder="Repeat new password" /></div>
        <button class="btn btn-primary" onclick="changePassword()">🔐 Update Password</button>
      </div>
    </div>
  </div>`;
}

function renderRecruiterApp() {
  const p = state.page || 'dashboard';
  const pages = { dashboard: renderRecruiterDashboard, jobs: renderRecruiterJobs, applications: renderRecruiterApplications, candidates: renderCandidateManagement, interviews: renderInterviewManagement, notifications: renderNotifications, settings: renderSettings, profile: renderSettings };
  return `
  ${renderNavbar()}
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-section">Recruitment</div>
      ${sidebarItem('dashboard','📊','Dashboard', p==='dashboard')}
      ${sidebarItem('jobs','💼','Job Postings', p==='jobs')}
      ${sidebarItem('applications','📄','Applications', p==='applications')}
      ${sidebarItem('candidates','👥','Candidates', p==='candidates')}
      ${sidebarItem('interviews','🗓️','Interviews', p==='interviews')}
      <div class="sidebar-section">Account</div>
      ${sidebarItem('notifications','🔔','Notifications', p==='notifications', getUnreadNotifs(state.user.id)||'')}
      ${sidebarItem('settings','⚙️','Settings', p==='settings')}
    </div>
    <div class="content">${(pages[p]||renderRecruiterDashboard)()}</div>
  </div>
  ${renderModal()}`;

function renderRecruiterDashboard() {
  const jobs = state.data.jobs;
  const apps = state.data.applications;
  const interviews = state.data.interviews;
  const userId = state.user.id;
  const myJobs = jobs.filter(j => j.postedBy === userId);
  const myJobIds = myJobs.map(j => j.id);
  const myApps = apps.filter(a => myJobIds.includes(a.jobId));
  const shortlisted = myApps.filter(a => a.shortlisted).length;
  const scheduledInterviews = interviews.filter(i => myJobIds.includes(i.jobId) && i.status === 'Scheduled').length;

  return `
  <div class="page-header">
    <div><div class="page-title">Welcome back, ${(state.user.name||'User').split(' ')[0]}! 👋</div><div class="page-subtitle">Here's your recruitment pipeline at a glance</div></div>
    <button class="btn btn-primary" onclick="openModal('postJob')">+ Post New Job</button>
  </div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-icon">💼</div><div class="stat-label">My Job Postings</div><div class="stat-value" style="color:var(--accent)">${myJobs.length}</div><div class="stat-sub">${myJobs.filter(j=>(j.status||'Active')==='Active').length} active</div></div>
    <div class="stat-card"><div class="stat-icon">📄</div><div class="stat-label">Total Applications</div><div class="stat-value" style="color:var(--accent2)">${myApps.length}</div><div class="stat-sub">${shortlisted} shortlisted</div></div>
    <div class="stat-card"><div class="stat-icon">🗓️</div><div class="stat-label">Scheduled Interviews</div><div class="stat-value" style="color:var(--accent3)">${scheduledInterviews}</div><div class="stat-sub">Upcoming</div></div>
    <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-label">Shortlisted</div><div class="stat-value" style="color:var(--warn)">${shortlisted}</div><div class="stat-sub">Ready for interview</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:24px;">
    <div class="card">
      <div class="flex justify-between items-center" style="margin-bottom:16px;">
        <div style="font-family:var(--font-head);font-size:15px;font-weight:700;">My Recent Jobs</div>
        <button class="btn btn-ghost btn-sm" onclick="navigate('jobs')">View all →</button>
      </div>
      ${myJobs.length === 0 ? `<div class="empty-state" style="padding:30px"><div class="empty-icon">💼</div><div class="empty-title">No jobs posted yet</div><button class="btn btn-primary btn-sm mt-2" onclick="openModal('postJob')">Post your first job</button></div>` : myJobs.slice(0,5).map(j => `
        <div class="flex justify-between items-center" style="padding:12px 0;border-bottom:1px solid var(--border);">

  </div>
  ${tabFiltered.length === 0 ? `<div class="empty-state"><div class="empty-icon">🗓️</div><div class="empty-title">No interviews ${state.activeTab===0?'scheduled yet':'in this category'}</div><p class="text-muted text-sm">Shortlist candidates first, then schedule interviews.</p></div>` : `

    <table>
      <thead><tr><th>Candidate</th><th>Job Role</th><th>Type</th><th>Scheduled</th><th>Duration</th><th>Interviewer</th><th>Location</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${tabFiltered.map(i => {
          const c = getUser(i.candidateId);
          const j = getJob(i.jobId);
          if (!c || !j) return '';
          return `<tr>
            <td><div style="font-weight:600">${c.name}</div><div class="text-xs text-muted">${c.email}</div></td>
            <td>${j.title}</td>
            <td><span class="badge badge-blue">${i.type||'Technical'}</span></td>

            <td>${i.interviewer||'TBD'}</td>
            <td>${i.location||'Google Meet'}</td>

            <td><div class="flex gap-1">
              ${i.status==='Scheduled'?`<button class="btn btn-sm btn-success" onclick="completeInterview('${i.id}')">✓ Done</button>`:''}

              ${i.feedback?`<button class="btn btn-sm btn-secondary" onclick="openModal('viewFeedback','${i.id}')">📋 View</button>`:''}
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`}`;
}

function renderJobSearch() {

    return s==='Active' && match && typeMatch;
  });
  const appliedIds = getApplicationsForCandidate(state.user.id).map(a => a.jobId);

  return `

    <div><div class="page-title">Browse Jobs</div><div class="page-subtitle">${jobs.length} opportunities available</div></div>
  </div>
  <div class="flex gap-2" style="margin-bottom:20px;flex-wrap:wrap;">
    <div class="search-bar" style="flex:1;min-width:240px;"><span>🔍</span><input placeholder="Search by role, skill, company, location…" value="${state.search}" oninput="updateSearch(this.value)" /></div>

  </div>
  <div class="grid-2">
    ${jobs.map(j => {
      const applied = appliedIds.includes(j.id);
      return `<div class="job-card" onclick="openModal('viewJobCandidate','${j.id}')">
        <div class="flex justify-between items-start" style="margin-bottom:10px;">
          <div style="width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:18px;">🏢</div>
          <span class="badge ${j.type==='Contract'?'badge-warn':j.type==='Part-time'?'badge-gray':'badge-green'}">${j.type}</span>
        </div>
        <div class="job-card-title">${j.title}</div>
        <div class="job-card-company">${j.company||'TechCorp'} · ${j.department}</div>
        <div class="job-card-tags">${(j.skills||[]).slice(0,3).map(s=>`<span class="badge badge-blue">${s}</span>`).join('')}</div>
        <div class="job-card-footer">
          <div><div style="font-size:13px;font-weight:600;color:var(--accent3)">${j.salary}</div><div class="text-xs text-muted">📍 ${j.location} · ⏱️ ${j.experience}</div></div>
          ${applied ? '<span class="badge badge-green">✅ Applied</span>' : `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openModal('applyJob','${j.id}')">Apply Now</button>`}
        </div>
      </div>`;

function renderModal() {
  if (!state.modal) return '';
  const { type, data } = state.modal;
  let content = '';
  const wideTypes = ['viewApplicants','viewCandidate','scheduleInterview','addInterview'];

  if (type === 'postJob') content = renderPostJobModal();
  else if (type === 'viewJob') content = renderViewJobModal(data);
  else if (type === 'viewJobCandidate') content = renderViewJobCandidateModal(data);
  else if (type === 'applyJob') content = renderApplyJobModal(data);
  else if (type === 'viewApplicants') content = renderViewApplicantsModal(data);
  else if (type === 'viewCandidate') content = renderViewCandidateModal(data);
  else if (type === 'scheduleInterview') content = renderScheduleInterviewModal(data);
  else if (type === 'addInterview') content = renderAddInterviewModal();
  else if (type === 'addFeedback') content = renderAddFeedbackModal(data);
  else if (type === 'viewFeedback') content = renderViewFeedbackModal(data);
  else if (type === 'addUser') content = renderAddUserModal();
  else if (type === 'viewUser') content = renderViewUserModal(data);

  return `
  <div class="modal-overlay" onclick="closeModal(event)">
    <div class="modal ${wideTypes.includes(type)?'modal-wide':''}" onclick="event.stopPropagation()">
      ${content}
    </div>
  </div>`;
}

function postJob() {
  const title = document.getElementById('j-title')?.value.trim();
  const dept = document.getElementById('j-dept')?.value.trim();
  const loc = document.getElementById('j-loc')?.value.trim();
  const type = document.getElementById('j-type')?.value;
  const salary = document.getElementById('j-salary')?.value.trim();
  const exp = document.getElementById('j-exp')?.value.trim();
  const skills = document.getElementById('j-skills')?.value.trim();
  const desc = document.getElementById('j-desc')?.value.trim();
  const req = document.getElementById('j-req')?.value.trim();
  const deadline = document.getElementById('j-deadline')?.value;
  const company = document.getElementById('j-company')?.value.trim();
  const errEl = document.getElementById('j-err');
  errEl.textContent = '';

  if (!title || !dept || !loc || !desc) { errEl.textContent = '⚠️ Please fill all required fields (Title, Department, Location, Description).'; return; }

  const job = {
    id: genId('job'), title, department: dept, location: loc, type,
    salary: salary || 'Negotiable', experience: exp || 'Any',
    skills: skills ? skills.split(',').map(s=>s.trim()).filter(Boolean) : [],
    description: desc, requirements: req || '', status: 'Active',
    postedBy: state.user.id, postedAt: new Date().toISOString().slice(0,10),
    deadline: deadline || '', company: company || 'TalentBridge'
  };

  state.data.jobs.push(job);
  saveData();
  state.modal = null;
  showToast(`Job "${title}" published successfully!`, 'success');
  navigate('jobs');
}

function closeJob(jobId) {
  const j = state.data.jobs.find(j => j.id === jobId);
  if (j) { j.status = 'Closed'; saveData(); showToast('Job closed.', 'info'); render(); }
}

function applyForJob(jobId) {
  const already = state.data.applications.find(a => a.candidateId === state.user.id && a.jobId === jobId);
  if (already) { 
    showToast("You've already applied for this job!", "info"); 
    closeModal();
    return; 
  }

  // Get the cover letter from the modal if it exists
  const coverLetter = document.getElementById('cover-letter')?.value.trim() || '';
  
  const score = scoreResume(state.user.id, jobId);
  const app = {
    id: genId('app'),
    candidateId: state.user.id,
    jobId: jobId,
    status: 'Applied',
    appliedAt: new Date().toISOString().slice(0,10),
    resumeScore: score,
    shortlisted: false,
    coverLetter: coverLetter
  };

  state.data.applications.push(app);
  const j = getJob(jobId);

  state.data.notifications.push({
    id: genId('notif'), 
    userId: state.user.id, 
    type: 'apply',
    message: `✅ Application submitted for "${j?.title || 'job'}". We'll keep you updated!`,
    read: false, 
    createdAt: new Date().toISOString().slice(0,10)
  });

  saveData();
  showToast("Application submitted! 🎉", "success");
  closeModal();
  render();
}

  if (nw.length < 8) { showToast('New password must be at least 8 characters.', 'error'); return; }
  if (confirm && nw !== confirm) { showToast('Passwords do not match.', 'error'); return; }

  state.user.password = nw;
  const idx = state.data.users.findIndex(u => u.id === state.user.id);
  if (idx !== -1) state.data.users[idx].password = nw;
  saveData();
  showToast('Password changed successfully!', 'success');
}

function handleResumeUpload(e) {
  const file = e.target.files[0];
  if (file) processResumeFile(file);
}

function processResumeFile(file) {
  const allowed = ['application/pdf','application/msword','application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
  if (!allowed.includes(file.type) && !file.name.match(/\.(pdf|doc|docx)$/i)) {
    showToast('Only PDF, DOC, DOCX files are allowed.', 'error'); 
    return;
  }
  if (file.size > 5 * 1024 * 1024) {
    showToast('File must be under 5MB.', 'error'); return;
  }
  const reader = new FileReader();
  reader.onload = () => {
    state.user.resume = reader.result;
    state.user.resumeFilename = file.name;
    const idx = state.data.users.findIndex(u => u.id === state.user.id);
    if (idx !== -1) { state.data.users[idx].resume = reader.result; state.data.users[idx].resumeFilename = file.name; }
    saveData();
    showToast(`Resume "${file.name}" uploaded! ✅`, 'success');
    render();
  };
  reader.readAsDataURL(file);
}

function viewResume(candidateId) {
  const user = state.data.users.find(u => u.id === candidateId);
  if (!user || !user.resume) { showToast("No resume found for this candidate.", "error"); return; }
  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html><html><head><title>${user.resumeFilename||'Resume'}</title></head><body style="margin:0;padding:0"><iframe src="${user.resume}" style="width:100%;height:100vh;border:none;"></iframe></body></html>`);
}

function addUser() {
  const name = document.getElementById('au-name')?.value.trim();
  const email = document.getElementById('au-email')?.value.trim().toLowerCase();
  const phone = document.getElementById('au-phone')?.value.trim();
  const role = document.getElementById('au-role')?.value;
  const pass = document.getElementById('au-pass')?.value;
  const errEl = document.getElementById('au-err');
  errEl.textContent = '';

  if (!name || !email || !pass) { errEl.textContent = '⚠️ Please fill all required fields.'; return; }
  if (pass.length < 8) { errEl.textContent = '⚠️ Password must be at least 8 characters.'; return; }
  if (state.data.users.find(u => u.email.toLowerCase() === email)) { errEl.textContent = '❌ Email already registered.'; return; }

  const newUser = {
    id: genId('user'), name, email, password: pass, phone: phone||'', role,
    createdAt: new Date().toISOString().slice(0,10), active: true,
    skills: '', experience: '', resume: null, resumeFilename: ''
  };
  state.data.users.push(newUser);
  saveData();
  state.modal = null;
  showToast(`User "${name}" created successfully!`, 'success');
  navigate('users');
}

function deleteUser(userId) {
  if (!confirm('Are you sure you want to delete this user?')) return;
  state.data.users = state.data.users.filter(u => u.id !== userId);
  saveData();
  showToast('User deleted.', 'info');
  render();
}

function toggleUserStatus(userId) {
  const u = state.data.users.find(u => u.id === userId);
  if (!u) {return;}
  u.active = !u.active;
  saveData();
  showToast(`User ${u.active?'enabled':'disabled'}.`, u.active?'success':'info');
  render();
}

function markNotifRead(id) {
  const n = state.data.notifications.find(n => n.id === id);
  if (n) { n.read = true; saveData(); render(); }
}

function markAllRead() {
  state.data.notifications.filter(n => n.userId === state.user.id).forEach(n => n.read = true);
  saveData();
  showToast('All notifications marked as read.', 'success');
  render();
}

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
if (state.user) {
  state.page = 'dashboard';
}
render();
</script>
</body>
</html>
